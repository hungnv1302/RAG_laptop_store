# ─── Paths ───────────────────────────────────────────────
paths:
  data_dir: "./data"
  json_file: "merge_data_all.json"
  pdf_file: "laptop_company.pdf"

# ─── Qdrant ──────────────────────────────────────────────
qdrant:
  host: "localhost"
  port: 6333
  local_path: "./qdrant_data"
  product_collection: "laptop_products"
  company_collection: "company_info"
  vector_size: 3072 #khi dung gemini-embedding-001, vector_size = 3072; khi dung text-embedding-3-small, vector_size = 1536

# ─── Gemini ──────────────────────────────────────────────
gemini:
  embedding_model: "gemini-embedding-001"
  generation_model: "gemini-1.5-flash"
  temperature: 0.7
  max_output_tokens: 2048
  
# ─── OpenAI ──────────────────────────────────────────────
openai:
  embedding_model: "text-embedding-3-small"
  generation_model: "gpt-4o-mini"
  temperature: 0.7
  max_tokens: 2048

# ─── Retrieval ───────────────────────────────────────────
retrieval:
  top_k: 10
  final_top_k: 5
  similarity_threshold: 0.3   # filter out candidates below this vector_score
  hybrid_alpha: 0.6           # weight for vector score vs BM25

# ─── Server ──────────────────────────────────────────────
server:
  host: "0.0.0.0"
  port: 8000
